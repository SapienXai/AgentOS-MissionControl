      <stop offset="0.55" stop-color="#09172B"/>
      <stop offset="1" stop-color="#040913"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 176) rotate(49.112) scale(478 395)">
      <stop stop-color="#2258F4" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#2258F4" stop-opacity="0"/>

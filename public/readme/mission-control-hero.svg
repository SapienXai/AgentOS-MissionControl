<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AgentOS control plane hero banner</title>
  <desc id="desc">A stylized control surface showing workspaces, agents, runtimes, diagnostics, and a mission command bar.</desc>
  <defs>
